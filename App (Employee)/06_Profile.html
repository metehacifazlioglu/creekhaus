<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreekHaus · Employee · Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
<script src="../assets/app.js"></script>
</head>
<body>
<div class="stage">
  <div class="stage-label">Employee App — Profile (simplified)</div>
  <div class="phone phone--tall">
    <div class="island"></div>
    <div class="statusbar">
      <span>9:41</span>
      <span class="sb-right"><i data-i="sig"></i><i data-i="wifi"></i><i data-i="batt"></i></span>
    </div>
    <div class="phone-scroll">
      <div class="app-header center" style="padding-top:14px">
        <a class="back" href="01_Home.html"><i data-i="back"></i></a>
        <h1>Profile</h1>
      </div>
      <div class="scroll-pad">
        <div class="prof-head">
          <div class="avatar">B</div>
          <div><div class="nm">Bahadour</div><div class="rl">Team Member</div></div>
        </div>

        <div class="field-list" style="margin-bottom:16px">
          <div class="field-row">
            <span class="fi"><i data-i="user"></i></span>
            <div><div class="fk">Name</div><div class="fv">Bahadour</div></div>
          </div>
          <div class="field-row">
            <span class="fi"><i data-i="phone"></i></span>
            <div><div class="fk">Phone</div><div class="fv">+1 (510) 555-0148</div></div>
          </div>
          <div class="field-row">
            <span class="fi"><i data-i="faceid"></i></span>
            <div><div class="fk">Sign in</div><div class="fv">Face ID enabled</div></div>
            <span class="togg"><span class="toggle"></span></span>
          </div>
        </div>

        <div class="field-list">
          <div class="field-row tap">
            <span class="fi"><i data-i="help"></i></span>
            <span class="lbl">Help &amp; Support</span>
            <span class="arr"><i data-i="chev"></i></span>
          </div>
          <div class="field-row tap signout">
            <span class="fi"><i data-i="logout"></i></span>
            <span class="lbl" style="color:var(--red)">Log out</span>
          </div>
        </div>

        <div class="ver">CreekHaus · Version 1.0.0</div>
      </div>
    </div>
    <nav class="tabbar">
      <a class="tab" href="01_Home.html"><i data-i="home"></i><span>Home</span></a>
      <a class="tab" href="02_My_Shift.html"><i data-i="calcheck"></i><span>My Shift</span></a>
      <button class="fab" title="Add daily update or incident report"><i data-i="plus"></i></button>
      <a class="tab" href="05_Quick_Guide.html"><i data-i="book"></i><span>Guides</span></a>
      <a class="tab active" href="06_Profile.html"><i data-i="user"></i><span>Profile</span></a>
    </nav>
  </div>
</div>
</body>
</html>
